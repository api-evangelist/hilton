provider: Hilton
providerId: hilton
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Hospitality
  - Hotels
  - Travel
  - Reservations
  - Loyalty
notes: Hilton operates a partner-only developer / connectivity program (Hilton Connect / Hilton Honors
  partner APIs) but does not publish a public per-tier API price list. Access is gated by formal partner
  onboarding (travel-distribution partners, OTA / GDS connectivity, loyalty integrations) and pricing /
  revenue-share is bilateral. Public reservation traffic is not exposed via a self-serve API. This artifact
  is left as an unreconciled stub pending partner-program disclosure.
sources:
  - https://www.hilton.com/en/corporate/
description: Hilton does not publish public API pricing. Partner connectivity (Hilton Connect, OTA / GDS,
  loyalty) is governed by bilateral partner agreements.
plans:
  - id: hilton-partner
    name: Hilton Partner Connectivity
    type: enterprise
    description: API access for OTA, GDS, channel-management, loyalty, and corporate-travel partners is
      negotiated under bilateral connectivity agreements. Pricing typically takes the form of revenue
      share, booking fees, or partner-program flat fees and is not publicly disclosed.
    entries:
      - label: Partner Connectivity Access
        description: Pricing and quotas negotiated bilaterally; not publicly disclosed
        name: partner_connectivity_access
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.hilton.com
        unit: 1
        price: 'contact partner program'
        userMultiplied: false
    elements:
      - name: Partner Onboarding Required
      - name: Bilateral Agreement
      - name: Hilton Developer API
