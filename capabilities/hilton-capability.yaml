naftiko: 1.0.0-alpha2
info:
  label: Hilton Developer API
  description: Hilton provides developer APIs for hotel search, availability, reservations, and loyalty program integration.
    The APIs enable travel partners and corporate clients to integrate Hilton booking capabilities.
  tags:
  - Hilton
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: hilton
    baseUri: https://api.hilton.com
    description: Hilton Developer API HTTP API.
    authentication:
      type: bearer
      token: '{{HILTON_TOKEN}}'
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: hilton-rest
    description: REST adapter for Hilton Developer API.
    resources:
    - path: /status
      name: getstatus
      operations:
      - method: GET
        name: getstatus
        description: Get API status
        call: hilton.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: hilton-mcp
    transport: http
    description: MCP adapter for Hilton Developer API for AI agent use.
    tools:
    - name: getstatus
      description: Get API status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hilton.getstatus
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    HILTON_TOKEN: HILTON_TOKEN
