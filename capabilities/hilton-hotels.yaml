naftiko: 1.0.0-alpha2
info:
  label: Hilton Developer API — Hotels
  description: 'Hilton Developer API — Hotels. 1 operations. Lead operation: Get API status. Self-contained Naftiko capability
    covering one Hilton business surface.'
  tags:
  - Hilton
  - Hotels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HILTON_API_KEY: HILTON_API_KEY
capability:
  consumes:
  - type: http
    namespace: hilton-hotels
    baseUri: https://api.hilton.com
    description: Hilton Developer API — Hotels business capability. Self-contained, no shared references.
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.HILTON_API_KEY}}'
  exposes:
  - type: rest
    namespace: hilton-hotels-rest
    port: 8080
    description: REST adapter for Hilton Developer API — Hotels. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/status
      name: status
      description: REST surface for status.
      operations:
      - method: GET
        name: getstatus
        description: Get API status
        call: hilton-hotels.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hilton-hotels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hilton Developer API — Hotels. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-api-status
      description: Get API status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hilton-hotels.getstatus
      outputParameters:
      - type: object
        mapping: $.
