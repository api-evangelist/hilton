aid: hilton
name: Hilton
description: Hilton is one of the largest and fastest-growing hospitality companies in the world, with a portfolio of hotel
  brands across luxury, full-service, focused-service, and timeshare segments. Hilton operates a developer program that exposes
  APIs for hotel search, availability, reservations, loyalty program integration, and partner distribution. Most Hilton APIs
  are partner-gated and require credentials issued through the Hilton developer program.
