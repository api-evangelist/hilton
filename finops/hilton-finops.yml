specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Hilton
providerId: hilton
publisherName: Hilton Worldwide Holdings Inc.
serviceCategory: Hospitality / Travel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Hospitality
  - Hotels
  - Travel
  - Reservations
  - Loyalty
  - FinOps
  - FOCUS
notes: Hilton's API surface is partner-gated; FinOps for a Hilton integration is typically a take-rate /
  commission shape (booking commission to OTAs, channel-management fees, loyalty-points reciprocity) plus
  bilateral partner-program fees. No public price book exists; this stub captures the right meter shape.
description: 'FOCUS-aligned FinOps stub for Hilton. Partner-gated; commission and per-booking economics
  govern the FinOps shape, with rates set in bilateral connectivity agreements.'
sources:
  - https://www.hilton.com/en/corporate/
billingModel:
  pricingCategory: Commission / Take Rate (per partner agreement)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Hilton
  ServiceCategory: Hospitality / Travel
  ProviderName: Hilton
  PublisherName: Hilton Worldwide Holdings Inc.
  InvoiceIssuerName: Hilton Worldwide Holdings Inc.
  PricingCategory: Commission
  PricingUnit: booking
  BillingCurrency: USD
  ChargeCategory: Usage
principles:
  - name: Visibility
    description: Reconcile booking activity through the partner portal's reporting feeds (booking,
      cancellation, no-show, loyalty-event events) against Hilton statements.
  - name: Allocation
    description: Tag bookings by partner channel, brand, market, and corporate-rate code so commission
      and revenue-share are attributable per business unit.
  - name: Optimization
    description: Cost levers are commission renegotiation, parity enforcement, and shifting traffic to
      lower-commission direct or loyalty channels.
  - name: Accountability
    description: Distribution / commercial team owns commission accounts; technology team owns
      connectivity uptime and 429 / error rates.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
meters:
  - name: bookings
    description: Reservations confirmed through the partner connectivity API
    unit: booking
    aggregation: sum
    dimensions:
      - partner_id
      - brand
      - property_id
      - market
      - rate_code
  - name: room_nights
    description: Room nights generated
    unit: room-night
    aggregation: sum
    dimensions:
      - partner_id
      - brand
      - property_id
  - name: gross_booking_value
    description: Gross dollar value of confirmed bookings
    unit: USD
    aggregation: sum
    dimensions:
      - partner_id
      - brand
      - property_id
  - name: commissions
    description: Commission paid (or due) to the partner
    unit: USD
    aggregation: sum
    dimensions:
      - partner_id
      - brand
  - name: loyalty_points_issued
    description: Hilton Honors points issued or accrued via the partner
    unit: point
    aggregation: sum
    dimensions:
      - partner_id
      - brand
apis:
  - name: Hilton Developer API
    baseURL: https://api.hilton.com
    tags:
      - Hospitality
      - Hotels
      - Reservations
      - Loyalty
    serviceName: Hilton Developer API
    serviceCategory: Hospitality / Travel
unitEconomics:
  - name: Effective Commission Rate
    metric: commissions / gross_booking_value
    target: per partner agreement
  - name: Cost per Booking
    metric: commissions / bookings
    target: per partner agreement
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
